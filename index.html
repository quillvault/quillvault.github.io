<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quill Vault</title>

<style>
body{
font-family: Arial, sans-serif;
background:#0f0f14;
color:#e8e8ef;
margin:0;
}

header{
background:#1a1a24;
padding:20px;
font-size:28px;
font-weight:bold;
}

nav{
background:#14141c;
padding:10px;
}

nav button{
background:#2a2a38;
border:none;
color:white;
padding:8px 14px;
margin-right:6px;
cursor:pointer;
border-radius:6px;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.story{
background:#1a1a24;
padding:15px;
margin-bottom:15px;
border-radius:8px;
}

.tag{
background:#2f2f44;
padding:3px 8px;
border-radius:5px;
margin-right:5px;
font-size:12px;
}

input, textarea{
width:100%;
margin-bottom:10px;
padding:8px;
border-radius:5px;
border:none;
background:#20202d;
color:white;
}

button.submit{
background:#4a5cff;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.search{
margin-bottom:20px;
}
</style>
</head>

<body>

<header>Quill Vault</header>

<nav>
<button onclick="showPage('home')">Browse</button>
<button onclick="showPage('post')">Post Story</button>
</nav>

<div class="container">

<div id="home">

<input class="search" id="search" placeholder="Search stories..." oninput="renderStories()">

<div id="storyList"></div>

</div>


<div id="post" style="display:none">

<h2>Post a Story</h2>

<input id="title" placeholder="Story Title">

<input id="author" placeholder="Author">

<input id="tags" placeholder="Tags (comma separated)">

<textarea id="content" rows="10" placeholder="Your story..."></textarea>

<button class="submit" onclick="postStory()">Publish</button>

</div>

</div>


<script>

let stories = JSON.parse(localStorage.getItem("stories") || "[]")

function showPage(page){
document.getElementById("home").style.display = page==="home"?"block":"none"
document.getElementById("post").style.display = page==="post"?"block":"none"
}

function postStory(){

let story = {
title: document.getElementById("title").value,
author: document.getElementById("author").value,
tags: document.getElementById("tags").value.split(",").map(t=>t.trim()),
content: document.getElementById("content").value
}

stories.unshift(story)

localStorage.setItem("stories", JSON.stringify(stories))

document.getElementById("title").value=""
document.getElementById("author").value=""
document.getElementById("tags").value=""
document.getElementById("content").value=""

showPage("home")
renderStories()

}

function renderStories(){

let list = document.getElementById("storyList")
let search = document.getElementById("search").value.toLowerCase()

list.innerHTML=""

stories
.filter(s =>
s.title.toLowerCase().includes(search) ||
s.author.toLowerCase().includes(search) ||
s.tags.join(" ").toLowerCase().includes(search)
)
.forEach(story =>{

let div = document.createElement("div")
div.className="story"

let tagHTML = story.tags.map(t=>`<span class="tag">${t}</span>`).join("")

div.innerHTML = `
<h3>${story.title}</h3>
<p><i>by ${story.author}</i></p>
<p>${tagHTML}</p>
<p>${story.content}</p>
`

list.appendChild(div)

})

}

renderStories()

</script>

</body>
</html>
